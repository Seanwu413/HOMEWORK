<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飯店客源與營收分析平台</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        body { display: flex; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f8f9fa; }
        .sidebar { width: 220px; background-color: #2c3e50; color: white; height: 100vh; padding: 20px; box-shadow: 2px 0 5px rgba(0,0,0,0.1); position: fixed; }
        .sidebar h2 { font-size: 1.2rem; margin-bottom: 30px; border-bottom: 1px solid #4ca1af; padding-bottom: 10px; }
        .sidebar a { display: block; color: #bdc3c7; text-decoration: none; margin: 15px 0; padding: 10px; border-radius: 5px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background-color: #34495e; color: white; font-weight: bold; }
        .content { margin-left: 260px; padding: 40px; width: 100%; max-width: 1000px; }
        .chart-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 40px; }
        h1 { color: #2c3e50; margin-bottom: 30px;}
        h2.section-title { color: #34495e; margin-top: 0; font-size: 1.4rem;}
        p.desc { color: #7f8c8d; font-size: 0.95rem; line-height: 1.5; margin-bottom: 20px;}
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>📊 分析儀表板</h2>
        <a href="#chart1">1. 各國主力客源比較</a>
        <a href="#chart2">2. 收入與人數關係</a>
        <a href="#chart3" class="active">3. 所在縣市住房率比較</a>
    </div>

    <div class="content">
        <h1>2025年度 飯店營運數據分析報告</h1>

        <div id="chart1" class="chart-container">
            <h2 class="section-title">📌 各國主力客源比較 (長條圖)</h2>
            <p class="desc">比較四家指標性飯店在「本國旅客」與主要「外籍旅客」上的數量差異，可看出各飯店的客群依賴程度。</p>
            <canvas id="sourceChart"></canvas>
        </div>

        <div id="chart2" class="chart-container">
            <h2 class="section-title">📌 總營收與入住人數關係 (雙軸混合圖)</h2>
            <p class="desc">藍色長條對應左軸，代表「飯店年度總營收(億元)」；紅色折線對應右軸，代表「年度總入住人數(人)」。</p>
            <canvas id="revenueChart"></canvas>
        </div>

        <div id="chart3" class="chart-container">
            <h2 class="section-title">📌 飯店所在縣市：總體客房住用率比較</h2>
            <p class="desc">分析這四家飯店所在的縣市（台北市、宜蘭縣、高雄市、台中市）2025 全年度的整體觀光旅館住房率(Occupancy Rate)。</p>
            <canvas id="regionChart"></canvas>
        </div>
    </div>

    <script>
        // 設定全局樣式
        Chart.defaults.font.family = "'Segoe UI', Tahoma, sans-serif";

        // --- 第一張圖：客源比較 ---
        const ctx1 = document.getElementById('sourceChart').getContext('2d');
        new Chart(ctx1, {
            type: 'bar',
            data: {
                labels: ['台中港酒店', '礁溪老爺酒店', '漢來大飯店', '台北寒舍喜來登'],
                datasets: [
                    { label: '本國 (Taiwan)', data: [43868, 135737, 144793, 56666], backgroundColor: '#3498db' },
                    { label: '日本 (Japan)', data: [4080, 333, 22940, 60273], backgroundColor: '#e74c3c' },
                    { label: '韓國 (Korea)', data: [1347, 249, 10461, 11377], backgroundColor: '#f1c40f' }
                ]
            },
            options: { responsive: true }
        });

        // --- 第二張圖：收入與人數關係 ---
        const ctx2 = document.getElementById('revenueChart').getContext('2d');
        new Chart(ctx2, {
            type: 'bar',
            data: {
                labels: ['台中港酒店', '礁溪老爺酒店', '漢來大飯店', '台北寒舍喜來登'],
                datasets: [
                    {
                        type: 'line',
                        label: '總入住人數 (人)',
                        data: [83112, 141386, 224130, 299560],
                        borderColor: '#e74c3c',
                        backgroundColor: '#e74c3c',
                        borderWidth: 3,
                        pointRadius: 6,
                        tension: 0.3,
                        yAxisID: 'yPeople'
                    },
                    {
                        type: 'bar',
                        label: '總營業收入 (億元)',
                        data: [2.52, 9.36, 18.86, 28.32],
                        backgroundColor: '#34495e',
                        yAxisID: 'yMoney'
                    }
                ]
            },
            options: {
                responsive: true,
                scales: {
                    yMoney: { type: 'linear', position: 'left', title: { display: true, text: '總營業收入 (億元)' } },
                    yPeople: { type: 'linear', position: 'right', title: { display: true, text: '總入住人數 (人)' }, grid: { drawOnChartArea: false } }
                }
            }
        });

        // --- 第三張圖：所在縣市住房率 ---
        const ctx3 = document.getElementById('regionChart').getContext('2d');
        new Chart(ctx3, {
            type: 'bar',
            data: {
                // X軸加上飯店名稱方便對照
                labels: ['台中市 (台中港酒店)', '宜蘭縣 (礁溪老爺酒店)', '高雄市 (漢來大飯店)', '台北市 (台北寒舍喜來登)'],
                datasets: [{
                    label: '2025 全年度平均住房率 (%)',
                    data: [61.44, 58.80, 61.38, 72.69],
                    // 給不同的城市配上不同的顏色
                    backgroundColor: [
                        'rgba(54, 162, 235, 0.7)',  // 台中藍
                        'rgba(75, 192, 192, 0.7)',  // 宜蘭綠
                        'rgba(255, 159, 64, 0.7)',  // 高雄橘
                        'rgba(153, 102, 255, 0.7)'  // 台北紫
                    ],
                    borderColor: [
                        'rgb(54, 162, 235)',
                        'rgb(75, 192, 192)',
                        'rgb(255, 159, 64)',
                        'rgb(153, 102, 255)'
                    ],
                    borderWidth: 1,
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false }, // 因為 X 軸已經有說明了，可以隱藏上方圖例
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.parsed.y + '%';
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100, // 住房率最高100%
                        title: { display: true, text: '住房率 (Occupancy Rate %)' }
                    }
                }
            }
        });
    </script>
</body>
</html>
